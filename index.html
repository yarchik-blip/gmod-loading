<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Loading...</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
color:white;

background:linear-gradient(120deg,#4facfe,#00f2fe,#43e97b);
background-size:400% 400%;
animation:bg 20s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{

text-align:center;
padding:60px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);

border-radius:25px;

box-shadow:
0 0 40px rgba(0,0,0,0.2),
inset 0 0 20px rgba(255,255,255,0.2);

animation:fade 2s ease;

}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

h1{
font-size:52px;
margin-bottom:40px;
letter-spacing:2px;
}

.bar{
width:420px;
height:20px;

background:rgba(255,255,255,0.25);

border-radius:12px;
overflow:hidden;

box-shadow:inset 0 0 10px rgba(0,0,0,0.2);
}

.progress{

height:100%;
width:0%;

background:linear-gradient(90deg,#ffffff,#c9f2ff);

animation:load 12s linear infinite;

}

@keyframes load{

0%{width:0%}
100%{width:100%}

}

p{

margin-top:20px;
opacity:0.9;
font-size:18px;

}

/* пузыри */

.bubble{

position:absolute;
bottom:-100px;

background:rgba(255,255,255,0.3);
border-radius:50%;

animation:rise linear infinite;

}

@keyframes rise{

from{
transform:translateY(0);
opacity:0.6;
}

to{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<h1>MLP-City | Адские колбаски</h1>

<div class="bar">
<div class="progress"></div>
</div>

<p>я ем грунт</p>

</div>

<script>

/* генерация пузырей */

for(let i=0;i<25;i++){

let bubble=document.createElement("div");

bubble.className="bubble";

let size=Math.random()*60+10;

bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.style.left=Math.random()*100+"%";

bubble.style.animationDuration=(Math.random()*10+10)+"s";

document.body.appendChild(bubble);

}

</script>

</body>
</html>
