<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background:linear-gradient(120deg,#4facfe,#00f2fe,#43e97b);
background-size:400% 400%;
animation:bg 18s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* окно как Windows 7 */

.window{

width:520px;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(25px);

border-radius:10px;

box-shadow:
0 0 30px rgba(0,0,0,0.3),
inset 0 1px 0 rgba(255,255,255,0.7);

overflow:hidden;

}

/* верхняя панель */

.titlebar{

height:36px;

background:linear-gradient(
to bottom,
rgba(255,255,255,0.9),
rgba(200,220,255,0.7)
);

display:flex;
align-items:center;

padding-left:12px;

font-weight:600;
color:#1a1a1a;

border-bottom:1px solid rgba(0,0,0,0.2);

}

/* тело окна */

.content{

padding:40px;
text-align:center;
color:white;

}

/* прогресс бар Windows 7 */

.progress-container{

width:100%;
height:22px;

background:rgba(255,255,255,0.4);

border-radius:4px;

box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);

overflow:hidden;

margin-top:30px;

}

.progress{

height:100%;
width:0%;

background:linear-gradient(
to bottom,
#8bd6ff,
#3ab1ff
);

animation:load 10s linear infinite;

}

/* эффект полосок */

.progress::after{

content:"";
position:absolute;
height:22px;
width:100%;

background:repeating-linear-gradient(
45deg,
rgba(255,255,255,0.3),
rgba(255,255,255,0.3) 10px,
transparent 10px,
transparent 20px
);

animation:move 1s linear infinite;

}

@keyframes move{
0%{background-position:0 0;}
100%{background-position:40px 0;}
}

@keyframes load{
0%{width:0%}
100%{width:100%}
}

/* пузыри */

.bubble{

position:absolute;
bottom:-100px;

background:rgba(255,255,255,0.3);

border-radius:50%;

animation:rise linear infinite;

}

@keyframes rise{

0%{
transform:translateY(0);
opacity:0.7;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="window">

<div class="titlebar">
MLP-City | HellYeah
</div>

<div class="content">

<h2>piska bobra, jopa bomja</h2>

<div class="progress-container">
<div class="progress"></div>
</div>

</div>

</div>

<script>

/* пузырьки Frutiger Aero */

for(let i=0;i<20;i++){

let bubble=document.createElement("div");

bubble.className="bubble";

let size=Math.random()*50+10;

bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.style.left=Math.random()*100+"%";

bubble.style.animationDuration=(Math.random()*12+8)+"s";

document.body.appendChild(bubble);

}

</script>

</body>
</html>
