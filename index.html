<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
color:white;

background: linear-gradient(120deg,#4facfe,#00f2fe);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.1);
padding:50px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.3);
}

h1{
font-size:50px;
margin-bottom:40px;
}

.bar{
width:400px;
height:18px;
background:rgba(255,255,255,0.2);
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:white;
animation:load 10s linear infinite;
}

@keyframes load{
0%{width:0%}
100%{width:100%}
}

</style>
</head>

<body>

<div class="container">

<h1>MLP-City </h1>

<div class="bar">
<div class="progress"></div>
</div>

<p>сквазимба бзабза :p</p>

</div>

</body>
</html>
